<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agents - MCMon Host</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<nav>
  <span class="logo">⚡ MCMon Host</span>
  <a href="/">Dashboard</a>
  <a href="/agents.html" class="active">Agents</a>
  <span class="spacer"></span>
  <div class="auth-token">
    <input type="password" id="adminToken" placeholder="Admin token" autocomplete="off" />
    <button class="btn" id="saveToken">Save</button>
    <span class="status" id="authStatus"></span>
  </div>
  <button class="theme-toggle" id="themeBtn" title="Toggle theme">🌙</button>
</nav>

<div class="wrap">

<div class="card">
  <div class="card-header">
    <h2>Connected Agents</h2>
  </div>
  <table>
    <thead>
      <tr><th>Status</th><th>Name</th><th>ID</th><th>Version</th><th>Last seen</th><th>Targets</th><th></th></tr>
    </thead>
    <tbody id="agentBody"></tbody>
  </table>
  <div id="emptyMsg" class="muted" style="padding:16px;text-align:center;display:none;">No agents registered yet.</div>
</div>

<div class="card">
  <div class="card-header">
    <h2>Create node</h2>
  </div>
  <div class="row" style="margin-bottom:12px;">
    <label>Name<input type="text" id="newName" placeholder="Tokyo Node"></label>
    <button class="btn primary" id="createAgent">Create</button>
  </div>
  <div class="err" id="createErr"></div>
</div>

<div class="card" id="configCard" style="display:none;">
  <div class="card-header">
    <h2 id="configTitle">Node config</h2>
  </div>
  <p class="muted" style="margin-bottom:10px;">Targets are configured on the host. Re-run the generated install command to overwrite a running agent.</p>
  <textarea id="targetsJson" style="width:100%;min-height:260px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;"></textarea>
  <div class="row" style="margin-top:12px;">
    <button class="btn primary" id="saveTargets">Save targets</button>
    <button class="btn" id="copyInstall">Copy Linux/macOS install</button>
    <button class="btn" id="copyWindowsInstall">Copy Windows install</button>
  </div>
  <pre id="installCmd" style="white-space:pre-wrap;margin-top:12px;"></pre>
  <div class="err" id="configErr"></div>
  <div class="ok" id="configOk"></div>
</div>

</div>

<script>
const themeBtn = document.getElementById('themeBtn');
const adminTokenInput = document.getElementById('adminToken');
const authStatus = document.getElementById('authStatus');
adminTokenInput.value = localStorage.getItem('mcmon-host-admin-token') || '';
document.getElementById('saveToken').onclick = () => {
  localStorage.setItem('mcmon-host-admin-token', adminTokenInput.value.trim());
  authStatus.textContent = 'Saved';
  loadAgents();
};
function apiFetch(url, opts = {}) {
  const headers = {};
  const token = localStorage.getItem('mcmon-host-admin-token') || adminTokenInput.value.trim();
  if (token) headers.Authorization = 'Bearer ' + token;
  if (opts.body) headers['Content-Type'] = 'application/json';
  return fetch(url, { ...opts, headers }).then(async r => {
    if (r.status === 401) {
      authStatus.textContent = 'Token required';
      throw new Error('unauthorized');
    }
    if (!r.ok) throw new Error(await r.text());
    authStatus.textContent = token ? 'Authorized' : '';
    return r.json();
  });
}
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('mcmon-theme', dark ? 'dark' : 'light');
}
themeBtn.onclick = () => { applyTheme(!document.body.classList.contains('dark')); };
applyTheme(localStorage.getItem('mcmon-theme') === 'dark' || (!localStorage.getItem('mcmon-theme') && matchMedia('(prefers-color-scheme:dark)').matches));

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadAgents() {
  const body = document.getElementById('agentBody');
  const emptyMsg = document.getElementById('emptyMsg');
  let agents;
  try {
    agents = await apiFetch('/api/agents') || [];
  } catch (e) {
    body.innerHTML = '';
    emptyMsg.style.display = '';
    emptyMsg.textContent = 'Enter the admin token from the host config to view agents.';
    return;
  }

  if (agents.length === 0) {
    body.innerHTML = '';
    emptyMsg.style.display = '';
    return;
  }
  emptyMsg.style.display = 'none';

  const targetsByAgent = {};
  for (const a of agents) {
    const targets = await apiFetch(`/api/agents/${encodeURIComponent(a.id)}/targets`) || [];
    targetsByAgent[a.id] = targets;
  }

  body.innerHTML = agents.map(a => {
    const targets = targetsByAgent[a.id] || [];
    const targetNames = targets.map(t => esc(t.name || `${t.host}:${t.port}`)).join(', ') || '<span class="muted">none</span>';
    return `<tr>
      <td><span class="dot ${a.online ? 'online' : 'offline'}"></span>${a.online ? 'Online' : 'Offline'}</td>
      <td>${esc(a.name)}</td>
      <td class="muted">${esc(a.id)}</td>
      <td>${esc(a.version || '—')}</td>
      <td>${a.last_seen ? new Date(a.last_seen * 1000).toLocaleString() : '—'}</td>
      <td>${targetNames}</td>
      <td><button class="btn ghost" data-config="${a.id}">Configure</button></td>
    </tr>`;
  }).join('');
  body.querySelectorAll('[data-config]').forEach(b => b.onclick = () => openConfig(b.dataset.config, agents.find(a => a.id === b.dataset.config), targetsByAgent[b.dataset.config] || []));
}

function defaultTarget() {
  return {
    target_id: 'server-1',
    name: 'Minecraft Server',
    host: 'mc.example.com',
    port: 25565,
    timeout_ms: 1500,
    monitors: {
      online: { enabled: true, interval_sec: 60 },
      players: { enabled: true, interval_sec: 60 },
      latency: { enabled: true, interval_sec: 60, probes_per_burst: 5, probe_gap_ms: 1500, protocol_version: 760 },
      loss: { enabled: true, interval_sec: 60, probes_per_burst: 5, probe_gap_ms: 1500 }
    }
  };
}

async function openConfig(id, agent, targets) {
  window.currentAgentId = id;
  window.currentAgent = agent;
  document.getElementById('configCard').style.display = '';
  document.getElementById('configTitle').textContent = `Node config · ${agent ? agent.name : id}`;
  document.getElementById('targetsJson').value = JSON.stringify(targets.length ? targets : [defaultTarget()], null, 2);
  document.getElementById('installCmd').textContent = installCommand(id, agent);
  document.getElementById('configErr').textContent = '';
  document.getElementById('configOk').textContent = '';
  document.getElementById('configCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function installCommand(id, agent) {
  const origin = location.origin;
  return `curl -fsSL '${origin}/api/agents/${encodeURIComponent(id)}/install.sh?token=${encodeURIComponent(agent.install_token || '<install-token-hidden>')}' | sudo sh`;
}
function windowsInstallCommand(id, agent) {
  const origin = location.origin;
  return `powershell -ExecutionPolicy Bypass -Command "iwr -UseBasicParsing '${origin}/api/agents/${encodeURIComponent(id)}/install.ps1?token=${encodeURIComponent(agent.install_token || '<install-token-hidden>')}' | iex"`;
}

document.getElementById('createAgent').onclick = async () => {
  document.getElementById('createErr').textContent = '';
  const name = document.getElementById('newName').value.trim();
  if (!name) { document.getElementById('createErr').textContent = 'Name is required.'; return; }
  try {
    await apiFetch('/api/agents', { method: 'POST', body: JSON.stringify({ name, targets: [defaultTarget()] }) });
    document.getElementById('newName').value = '';
    await loadAgents();
  } catch (e) {
    document.getElementById('createErr').textContent = e.message;
  }
};

document.getElementById('saveTargets').onclick = async () => {
  document.getElementById('configErr').textContent = '';
  document.getElementById('configOk').textContent = '';
  try {
    const targets = JSON.parse(document.getElementById('targetsJson').value);
    await apiFetch(`/api/agents/${encodeURIComponent(window.currentAgentId)}/targets`, { method: 'PUT', body: JSON.stringify(targets) });
    document.getElementById('configOk').textContent = 'Targets saved. Re-run the install command to overwrite the agent config.';
    await loadAgents();
  } catch (e) {
    document.getElementById('configErr').textContent = e.message;
  }
};

document.getElementById('copyInstall').onclick = async () => {
  await navigator.clipboard.writeText(document.getElementById('installCmd').textContent);
  document.getElementById('configOk').textContent = 'Linux/macOS install command copied.';
};
document.getElementById('copyWindowsInstall').onclick = async () => {
  await navigator.clipboard.writeText(windowsInstallCommand(window.currentAgentId, window.currentAgent));
  document.getElementById('configOk').textContent = 'Windows install command copied.';
};

loadAgents();
setInterval(loadAgents, 15000);
</script>

</body>
</html>
